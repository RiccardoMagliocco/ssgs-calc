name: CI Pipeline

on:
  push:
    branches:
      - master  # O 'main' se il tuo ramo principale si chiama 'main'
  pull_request:
    branches:
      - master  # O 'main'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]  # Puoi usare qualsiasi versione di Node.js desideri

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm test -- --coverage  # Questo esegue i test con la generazione della coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v2
        with:
          name: coverage-report
          path: coverage/ 

